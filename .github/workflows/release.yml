name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build --configuration Release --no-restore

      - name: Create Release Directory
        run: |
          mkdir -p release
          copy "bin\Release\net48\NoNameTag.dll" "release\NoNameTag.dll"

      - name: Get version from tag
        id: tag_version
        run: |
          $tag = "${{ github.ref }}" -replace 'refs/tags/', ''
          echo "version=$tag" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/NoNameTag.dll
          draft: false
          prerelease: false
          body: |
            # NoNameTag Release ${{ steps.tag_version.outputs.version }}

            ## 下载
            - `NoNameTag.dll` - 插件主文件

            ## 安装步骤
            1. 将 `NoNameTag.dll` 复制到服务器的 `Rocket/Plugins` 文件夹
            2. 重启服务器或使用 `/rocket reload` 命令
            3. 编辑 `Rocket/Plugins/NoNameTag/NoNameTag.configuration.xml` 进行配置

            ## 更新日志
            详见 [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
